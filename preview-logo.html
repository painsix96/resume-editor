<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo 预览</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: white;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .logo-container {
            background: white;
            padding: 60px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 40px;
        }
        .description {
            color: white;
            max-width: 600px;
            text-align: center;
            line-height: 1.8;
        }
        .features {
            margin-top: 30px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .feature {
            background: rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <h1>✨ 简约版 Logo 设计预览</h1>
    
    <div class="logo-container">
        <svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <g transform="translate(50, 40)">
                <rect x="0" y="0" width="100" height="120" rx="6" fill="#FF6B6B"/>
                <g fill="#FFFFFF" opacity="0.85">
                    <rect x="14" y="20" width="50" height="4" rx="2"/>
                    <rect x="14" y="32" width="72" height="4" rx="2"/>
                    <rect x="14" y="48" width="60" height="4" rx="2"/>
                    <rect x="14" y="60" width="68" height="4" rx="2"/>
                    <rect x="14" y="76" width="55" height="4" rx="2"/>
                </g>
            </g>
        </svg>
    </div>
    
    <div class="description">
        <h2 style="color: white; margin-bottom: 20px;">设计特点</h2>
        <div class="features">
            <div class="feature">🎯 极简设计</div>
            <div class="feature">🪟 透明背景</div>
            <div class="feature">📄 文档造型</div>
            <div class="feature">❤️ 温暖珊瑚红</div>
        </div>
        <p style="margin-top: 30px;">
            这次的设计非常简约！<br>
            只有一个简洁的文档形状，去掉了所有花哨的元素。<br>
            温暖的珊瑚红色，专业又不失活力！
        </p>
    </div>
</body>
</html>
